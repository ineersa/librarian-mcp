mcp:
    app: 'librarian-mcp'
    version: '1.0.0'
    description: 'Librarian MCP HTTP server'
    instructions: 'Use search-libraries to find a library, then semantic-search/grep/read on one library.'
    client_transports:
        stdio: false
        http: true
    http:
        path: '/_mcp'
        session:
            store: file
            ttl: 3600
