# Production-like / VPS stack: FrankenPHP + SQLite volume.
# Usage: docker compose -f compose.yaml -f compose.prod.yaml up -d --build
#
# Symfony: `.env` + `.env.prod` (+ optional `.env.prod.local` on the build host) are compiled into
# `.env.local.php` in the image via `composer dump-env prod` in the Dockerfile.
#
# Compose loads `.env.prod.local` via `env_file` into each service (no shell `export`). Use it for
# Caddy `{env.MERCURE_*}` / `SERVER_NAME` and any runtime overrides; values override Symfonyâ€™s dump
# for the same variable names. Copy `.env.prod.local.dist` â†’ `.env.prod.local`.
#
# HTTP publish: default is 0.0.0.0:8093â†’container:80 so the app is reachable from the local network.
# For dedicated hosts where Caddy should bind public 80/443 + ACME, override in `.env.prod.local`
# (or project `.env`) and add 443 mappings via a local compose override (see docs/server-deployment.md).

x-prod-env-file: &prod-env-file
  env_file:
    - path: .env.prod.local
      required: false

x-host-gateway: &host-gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-json-logging: &json-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

# Multiline Caddy config; keep in Compose (dotenv is awkward for this block).
x-caddy-inline-env: &caddy-inline-env
  FRANKENPHP_CONFIG: import /etc/caddy/worker.Caddyfile
  MERCURE_EXTRA_DIRECTIVES: |-
    transport bolt {
      path /data/mercure.db
    }

services:
  php:
    image: ${APP_IMAGE:-symfony-web-template-app}
    restart: unless-stopped
    <<: [*prod-env-file, *host-gateway, *json-logging]
    environment:
      APP_ENV: prod
      <<: *caddy-inline-env
    volumes:
      - ./data-prod:/app/data-prod
      - caddy_data:/data
      - caddy_config:/config
      # Keep vera config available for both root and non-root execution.
      - ./docker/vera:/root/.vera:delegated
      - ./docker/vera:/app/.vera:delegated
    networks:
      - app_net
    ports:
      - "${APP_HTTP_BIND:-0.0.0.0}:${APP_HTTP_PORT:-8093}:80"
    dns:
      - "${DOCKER_DNS_PRIMARY:-1.1.1.1}"
      - "${DOCKER_DNS_SECONDARY:-8.8.8.8}"

  messenger:
    image: ${APP_IMAGE:-symfony-web-template-app}
    restart: unless-stopped
    <<: [*prod-env-file, *host-gateway, *json-logging]
    environment:
      APP_ENV: prod
    command: ["php", "bin/console", "messenger:consume", "--all", "--exclude-receivers=failed"]
    depends_on:
      - php
    volumes:
      - ./data-prod:/app/data-prod
      # Messenger may run as a non-root user (HOME=/app) depending on runtime.
      - ./docker/vera:/root/.vera:delegated
      - ./docker/vera:/app/.vera:delegated
    networks:
      - app_net
    dns:
      - "${DOCKER_DNS_PRIMARY:-1.1.1.1}"
      - "${DOCKER_DNS_SECONDARY:-8.8.8.8}"

networks:
  app_net:
    driver: bridge
